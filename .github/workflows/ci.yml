name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      # Dogfood: local action (dist/ must exist). Avoids runnerlens/runner-lens if that repo is unavailable.
      - uses: ./

      - run: npm run typecheck
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci && npm run build

      - uses: ./
        id: lens
        with:
          sample-interval: '1'
          max-file-size: '50'
          upload-artifact: 'true'

      # Give the detached collector time for several samples (post waits ~1.2s after SIGTERM).
      - run: sleep 20

  # Step outputs set only in the action's post job are not reliably available as
  # jobs.integration.outputs for dependent jobs. Verify via the uploaded report instead.
  verify-integration:
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: runner-lens-integration
          path: rl-art

      - name: Verify metrics report artifact
        run: |
          test -f rl-art/report.json
          python3 -c "import json; d=json.load(open('rl-art/report.json')); n=d.get('sample_count',0); assert n>0, n; print('RunnerLens sample_count:', n)"
