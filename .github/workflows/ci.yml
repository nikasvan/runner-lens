name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # ── Dogfood: monitor this CI job ────────────────────────
      - uses: runnerlens/runner-lens@main

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      # ── Integration: verify the action loads & produces output ──
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci && npm run build

      # Use the local action (this repo)
      - uses: ./
        id: lens
        with:
          sample-interval: '1'
          max-file-size: '50'

      - run: sleep 10

      # Post step runs automatically; then check outputs
      - name: Verify outputs exist
        run: |
          echo "CPU avg: ${{ steps.lens.outputs.cpu-avg }}"
          echo "Samples: ${{ steps.lens.outputs.samples }}"
          test -n "${{ steps.lens.outputs.cpu-avg }}" || exit 1
          test -n "${{ steps.lens.outputs.samples }}" || exit 1
