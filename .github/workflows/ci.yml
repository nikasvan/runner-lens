name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      # Dogfood: local action (dist/ must exist). Avoids runnerlens/runner-lens if that repo is unavailable.
      - uses: ./

      - run: npm run typecheck
      - run: npm test

  # Outputs from actions with post: are only available after the job finishes (post runs last).
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      # Hyphenated action outputs: use ['cpu-avg'] — dots parse as subtraction (cpu minus avg).
      cpu-avg: ${{ steps.lens.outputs['cpu-avg'] }}
      samples: ${{ steps.lens.outputs.samples }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci && npm run build

      - uses: ./
        id: lens
        with:
          sample-interval: '1'
          max-file-size: '50'

      - run: sleep 10

  verify-integration:
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Verify outputs exist
        run: |
          echo "CPU avg: ${{ needs.integration.outputs['cpu-avg'] }}"
          echo "Samples: ${{ needs.integration.outputs.samples }}"
          test -n "${{ needs.integration.outputs['cpu-avg'] }}" || exit 1
          test -n "${{ needs.integration.outputs.samples }}" || exit 1
