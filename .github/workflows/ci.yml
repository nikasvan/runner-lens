name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      # Dogfood: local action (dist/ must exist). Avoids runnerlens/runner-lens if that repo is unavailable.
      - uses: ./

      - run: npm run typecheck
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci && npm run build

      - uses: ./
        with:
          sample-interval: '1'
          max-file-size: '50'
          # Upload report.json (e.g. runner-lens-integration) under run Artifacts.
          upload-artifact: 'true'

      - run: sleep 20
