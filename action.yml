name: 'RunnerLens'
description: >
  Zero-config observability for GitHub Actions runners.
  Monitor CPU and memory usage in your workflow.
author: 'RunnerLens'

branding:
  icon: 'activity'
  color: 'blue'

inputs:
  mode:
    description: 'Action mode: monitor (default) or summarize (workflow-level summary)'
    required: false
    default: 'monitor'
  sample-interval:
    description: 'Metric sampling interval in seconds (1–30)'
    required: false
    default: '3'
  github-token:
    description: 'GitHub token for per-step metrics (defaults to the built-in token)'
    required: false
    default: ${{ github.token }}
  max-file-size:
    description: 'Maximum metrics file size in MB before rotation (0 = unlimited)'
    required: false
    default: '100'
  upload-artifact:
    description: 'Upload metrics report as a workflow artifact (true/false)'
    required: false
    default: 'true'
  write-summary:
    description: 'Write job summary for this job (set to false when using a summarize job)'
    required: false
    default: 'true'

outputs:
  cpu-avg:
    description: 'Average CPU usage %'
  cpu-max:
    description: 'Peak CPU usage %'
  cpu-p95:
    description: '95th-percentile CPU usage %'
  mem-avg-mb:
    description: 'Average memory usage (MB)'
  mem-max-mb:
    description: 'Peak memory usage (MB)'
  mem-avg-pct:
    description: 'Average memory usage %'
  samples:
    description: 'Number of samples collected'
  duration-seconds:
    description: 'Monitoring wall-clock duration'
  report-json:
    description: 'Full report as a JSON string'

runs:
  using: 'node24'
  main: 'dist/main/index.js'
  post: 'dist/post/index.js'
  post-if: 'always()'
